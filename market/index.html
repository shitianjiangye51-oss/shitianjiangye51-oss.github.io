<script>
(function() {
  var COINS = "bitcoin,ethereum,solana,ripple,cardano,dogecoin,avalanche-2,chainlink,litecoin,polkadot";
  var API = "https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&ids=" + COINS +
            "&order=market_cap_desc&sparkline=true&price_change_percentage=24h";
  var REFRESH_MS = 60000;
  var timer = null;

  // 传统资产市值参考快照（美元）。股票/贵金属无免费实时接口，
  // 这里用近期公开数据的估算值，需要更新时改下面的数字即可。
  var TRAD_ASSETS = [
    { name: "黄金",     tag: "贵金属", mark: "🟡", cap: 18.5e12 },
    { name: "英伟达",   tag: "美股",   mark: "🎮", cap: 3.9e12 },
    { name: "苹果",     tag: "美股",   mark: "🍎", cap: 3.5e12 },
    { name: "微软",     tag: "美股",   mark: "🪟", cap: 3.4e12 },
    { name: "Alphabet", tag: "美股",   mark: "🔍", cap: 2.5e12 },
    { name: "亚马逊",   tag: "美股",   mark: "📦", cap: 2.4e12 },
    { name: "白银",     tag: "贵金属", mark: "⚪", cap: 1.9e12 },
    { name: "沙特阿美", tag: "沙特股", mark: "🛢️", cap: 1.8e12 },
    { name: "Meta",     tag: "美股",   mark: "📘", cap: 1.6e12 }
  ];
  var RANK_KEY = "market-btc-rank";

  function fmtPrice(v) {
    if (v == null) return "--";
    if (v >= 1000) return "$" + v.toLocaleString("en-US", { maximumFractionDigits: 0 });
    if (v >= 1) return "$" + v.toLocaleString("en-US", { maximumFractionDigits: 2 });
    return "$" + v.toLocaleString("en-US", { maximumFractionDigits: 5 });
  }

  function fmtCap(v) {
    if (v == null) return "--";
    if (v >= 1e12) return "$" + (v / 1e12).toFixed(2) + "T";
    if (v >= 1e9) return "$" + (v / 1e9).toFixed(2) + "B";
    if (v >= 1e6) return "$" + (v / 1e6).toFixed(2) + "M";
    return "$" + v.toFixed(0);
  }

  // 排行榜用的中文市值格式（万亿）
  function fmtCapCN(v) {
    if (v == null) return "--";
    return "$" + (v / 1e12).toFixed(2) + " 万亿";
  }

  function esc(s) { var d = document.createElement("div"); d.textContent = s; return d.innerHTML; }

  // 渲染「全球资产市值排行榜」：加密资产实时，传统资产用快照，合并后重排
  function renderRank(btcCap, ethCap) {
    if (btcCap == null) return;
    var list = TRAD_ASSETS.slice();
    list.push({ name: "比特币", tag: "加密货币", mark: "₿", cap: btcCap, isBTC: true, live: true });
    if (ethCap != null) list.push({ name: "以太坊", tag: "加密货币", mark: "Ξ", cap: ethCap, live: true });
    list.sort(function(a, b) { return b.cap - a.cap; });

    var maxCap = list[0].cap;
    var idx = -1, goldCap = 18.5e12;
    for (var i = 0; i < list.length; i++) {
      if (list[i].isBTC) idx = i;
      if (list[i].name === "黄金") goldCap = list[i].cap;
    }
    var rank = idx + 1;
    var above = list[idx - 1];
    var below = list[idx + 1];

    // 头条文案：优先「超越了谁」，否则「还差几 %」
    var prev = parseInt(localStorage.getItem(RANK_KEY), 10);
    var headline;
    if (!isNaN(prev) && rank < prev && below) {
      headline = '<span class="rank-hot">🎉 BTC 排名上升！刚刚超越了 <b>' + esc(below.name) +
                 '</b>，现居全球第 <b>' + rank + '</b> 大资产</span>';
    } else if (above) {
      var gap = (above.cap - btcCap) / btcCap * 100;
      headline = 'BTC 现居全球第 <b>' + rank + '</b> 大资产，距离超越 <b>' + esc(above.name) +
                 '</b> 还差 <b>' + gap.toFixed(1) + '%</b>';
    } else {
      headline = '👑 BTC 已经是全球市值第一的资产！';
    }
    headline += '<div class="rank-sub">BTC 市值 ≈ 黄金的 <b>' + (btcCap / goldCap * 100).toFixed(1) +
                '%</b>，登顶黄金还需上涨 <b>' + ((goldCap - btcCap) / btcCap * 100).toFixed(0) + '%</b></div>';
    localStorage.setItem(RANK_KEY, rank);
    document.getElementById("rank-headline").innerHTML = headline;

    var html = "";
    list.forEach(function(a, i) {
      var r = i + 1;
      var badge = r <= 3 ? '<span class="rank-medal m' + r + '">' + r + '</span>'
                         : '<span class="rank-num">' + r + '</span>';
      var barW = Math.max(3, a.cap / maxCap * 100).toFixed(1);
      html += '<div class="rank-row' + (a.isBTC ? ' is-btc' : '') + '">';
      html += badge;
      html += '<span class="rank-mark">' + a.mark + '</span>';
      html += '<div class="rank-info"><div class="rank-name">' + esc(a.name) +
              (a.live ? ' <span class="rank-live-dot" title="实时"></span>' : '') + '</div>';
      html += '<div class="rank-bar"><span style="width:' + barW + '%"></span></div></div>';
      html += '<div class="rank-cap">' + fmtCapCN(a.cap) + '<div class="rank-tag">' + esc(a.tag) + '</div></div>';
      html += '</div>';
    });
    document.getElementById("rank-list").innerHTML = html;
    document.getElementById("rank-section").style.display = "block";
  }

  // 用 sparkline 数据画一条迷你走势 SVG（涨绿跌红）
  function sparkline(prices, up) {
    if (!prices || prices.length < 2) return "";
    var w = 220, h = 44, min = Math.min.apply(null, prices), max = Math.max.apply(null, prices);
    var range = (max - min) || 1;
    var step = w / (prices.length - 1);
    var pts = prices.map(function(p, i) {
      var x = (i * step).toFixed(1);
      var y = (h - ((p - min) / range) * (h - 4) - 2).toFixed(1);
      return x + "," + y;
    }).join(" ");
    var color = up ? "#16a34a" : "#dc2626";
    return '<svg class="coin-spark" viewBox="0 0 ' + w + ' ' + h + '" preserveAspectRatio="none">' +
           '<polyline fill="none" stroke="' + color + '" stroke-width="1.6" points="' + pts + '"/></svg>';
  }

  function render(coins) {
    var grid = document.getElementById("market-grid");
    var html = "";
    coins.forEach(function(c) {
      var chg = c.price_change_percentage_24h;
      var up = (chg == null) ? true : chg >= 0;
      var chgTxt = (chg == null) ? "--" : (up ? "▲ " : "▼ ") + Math.abs(chg).toFixed(2) + "%";
      var spark = c.sparkline_in_7d ? sparkline(c.sparkline_in_7d.price, up) : "";
      html += '<div class="coin-card">';
      html += '<div class="coin-head">';
      html += '<img class="coin-logo" src="' + c.image + '" srcset="/img/loading.gif" lazyload alt="" loading="lazy">';
      html += '<div><div class="coin-name">' + c.name + '</div>';
      html += '<div class="coin-symbol">' + c.symbol + '</div></div></div>';
      html += '<div class="coin-price">' + fmtPrice(c.current_price) + '</div>';
      html += '<div class="coin-change ' + (up ? "up" : "down") + '">' + chgTxt + '</div>';
      html += spark;
      html += '<div class="coin-cap"><span>市值</span><span>' + fmtCap(c.market_cap) + '</span></div>';
      html += '</div>';
    });
    grid.innerHTML = html;

    // 动态插入的 logo 不会被 Fluid 懒加载处理，手动清掉占位属性
    var imgs = grid.querySelectorAll(".coin-logo");
    for (var i = 0; i < imgs.length; i++) {
      imgs[i].removeAttribute("srcset");
      imgs[i].removeAttribute("lazyload");
    }

    var btc = null, eth = null;
    coins.forEach(function(c) { if (c.id === "bitcoin") btc = c; if (c.id === "ethereum") eth = c; });
    if (btc) renderRank(btc.market_cap, eth ? eth.market_cap : null);
    document.getElementById("coin-section").style.display = "block";

    var d = new Date();
    document.getElementById("market-updated").textContent =
      "更新于 " + String(d.getHours()).padStart(2, "0") + ":" + String(d.getMinutes()).padStart(2, "0") + ":" + String(d.getSeconds()).padStart(2, "0");
  }

  function load() {
    fetch(API, { headers: { "Accept": "application/json" } })
      .then(function(res) { if (!res.ok) throw new Error(res.status); return res.json(); })
      .then(function(data) {
        document.getElementById("market-loading").style.display = "none";
        document.getElementById("market-error").style.display = "none";
        render(data);
      })
      .catch(function() {
        document.getElementById("market-loading").style.display = "none";
        if (!document.getElementById("market-grid").innerHTML) {
          document.getElementById("market-error").style.display = "block";
        }
      });
  }

  document.getElementById("market-refresh").addEventListener("click", load);
  load();
  timer = setInterval(load, REFRESH_MS);
  window.addEventListener("pagehide", function() { if (timer) clearInterval(timer); });
})();
</script>
