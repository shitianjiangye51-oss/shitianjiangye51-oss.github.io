<style>
.memos-intro { text-align:center; color:#718096; font-size:1.05rem; margin-bottom:2rem; }
.memo-card { background:#fff; border-radius:12px; padding:1.5rem; margin-bottom:1.2rem; box-shadow:0 2px 12px rgba(0,0,0,.08); transition:transform .2s, box-shadow .2s; position:relative; }
.memo-card:hover { transform:translateY(-3px); box-shadow:0 6px 20px rgba(0,0,0,.12); }
html[data-user-color-scheme="dark"] .memo-card { background:#252d38; }
.memo-title { font-size:1.1rem; font-weight:600; color:#1a202c; margin-bottom:.5rem; }
html[data-user-color-scheme="dark"] .memo-title { color:#c4c6c9; }
.memo-body { color:#4a5568; line-height:1.8; white-space:pre-wrap; word-break:break-word; }
html[data-user-color-scheme="dark"] .memo-body { color:#a7a9ad; }
.memo-meta { margin-top:1rem; padding-top:.8rem; border-top:1px solid #eaecef; font-size:.85rem; color:#a0aec0; display:flex; justify-content:space-between; align-items:center; }
html[data-user-color-scheme="dark"] .memo-meta { border-top-color:#435266; }
.memo-date { display:flex; align-items:center; gap:.4rem; }
.memo-tag { background:#fff7ed; color:#dd6b20; border-radius:20px; padding:.15rem .7rem; font-size:.75rem; }
html[data-user-color-scheme="dark"] .memo-tag { background:#3d2f1f; color:#f6ad55; }
.memo-head { display:flex; align-items:center; margin-bottom:.8rem; }
.memo-avatar { width:40px; height:40px; border-radius:50%; margin-right:.8rem; object-fit:cover; background:#edf2f7; border:2px solid #e2e8f0; flex-shrink:0; }
html[data-user-color-scheme="dark"] .memo-avatar { background:#2d3748; border-color:#4a5568; }
.memo-author { font-weight:600; color:#2d3748; }
html[data-user-color-scheme="dark"] .memo-author { color:#c4c6c9; }
</style>

<script>
(function() {
  var REPO = "shitianjiangye51-oss/shitianjiangye51-oss.github.io";
  var LABEL = encodeURIComponent("碎碎念");
  var API = "https://api.github.com/repos/" + REPO + "/issues?labels=" + LABEL + "&state=open&per_page=100&sort=created&direction=desc";

  // 兜底头像：灰色圆形人形剪影（内联 SVG，不依赖网络，加载失败时使用）
  var FALLBACK_AVATAR = "data:image/svg+xml;utf8," + encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40"><circle cx="20" cy="20" r="20" fill="#cbd5e0"/><circle cx="20" cy="15" r="7" fill="#ffffff"/><path d="M6 36c0-8 6-12 14-12s14 4 14 12" fill="#ffffff"/></svg>');

  function escapeHtml(str) {
    var div = document.createElement("div");
    div.textContent = str;
    return div.innerHTML;
  }

  function formatDate(iso) {
    var d = new Date(iso);
    var y = d.getFullYear();
    var m = String(d.getMonth() + 1).padStart(2, "0");
    var day = String(d.getDate()).padStart(2, "0");
    var hh = String(d.getHours()).padStart(2, "0");
    var mm = String(d.getMinutes()).padStart(2, "0");
    return y + "-" + m + "-" + day + " " + hh + ":" + mm;
  }

  function render(memos) {
    var list = document.getElementById("memos-list");
    if (!memos || memos.length === 0) {
      list.innerHTML = '<p class="text-center" style="color:#a0aec0;padding:2rem;">还没有碎碎念，敬请期待～</p>';
      return;
    }
    var html = "";
    memos.forEach(function(memo) {
      // 头像：优先使用 GitHub 返回的 avatar_url，缺失时直接用兜底头像
      var avatar = (memo.user && memo.user.avatar_url) ? memo.user.avatar_url : FALLBACK_AVATAR;
      html += '<div class="memo-card">';
      html += '<div class="memo-head">';
      html += '<img class="memo-avatar" src="' + avatar + '" srcset="/img/loading.gif" lazyload alt="avatar" loading="lazy">';
      html += '<span class="memo-author">' + escapeHtml(memo.user ? memo.user.login : "") + '</span>';
      html += '</div>';
      html += '<div class="memo-title">' + escapeHtml(memo.title) + '</div>';
      if (memo.body) { html += '<div class="memo-body">' + escapeHtml(memo.body) + '</div>'; }
      html += '<div class="memo-meta">';
      html += '<span class="memo-date"><i class="iconfont icon-time"></i>' + formatDate(memo.created_at) + '</span>';
      html += '<span class="memo-tag">碎碎念</span>';
      html += '</div>';
      html += '</div>';
    });
    list.innerHTML = html;

    // Fluid 的懒加载过滤器会给页面中的 img 注入 srcset 占位图(loading.gif)，
    // 但头像是在页面加载完成后才动态插入的，不会被 Fluid 的懒加载脚本处理，
    // 因此这里手动移除 srcset / lazyload 属性，让浏览器加载真实头像。
    var imgs = list.querySelectorAll(".memo-avatar");
    for (var i = 0; i < imgs.length; i++) {
      imgs[i].removeAttribute("srcset");
      imgs[i].removeAttribute("lazyload");
      // 头像加载失败时自动替换为兜底头像（data-fbk 标记防止死循环）
      imgs[i].addEventListener("error", function() {
        if (this.getAttribute("data-fbk")) return;
        this.setAttribute("data-fbk", "1");
        this.src = FALLBACK_AVATAR;
      });
    }
  }

  fetch(API, { headers: { "Accept": "application/vnd.github.v3+json" } })
    .then(function(res) { if (!res.ok) throw new Error(res.status); return res.json(); })
    .then(function(data) {
      document.getElementById("memos-loading").style.display = "none";
      render(data);
    })
    .catch(function() {
      document.getElementById("memos-loading").style.display = "none";
      document.getElementById("memos-error").style.display = "block";
    });
})();
</script>
